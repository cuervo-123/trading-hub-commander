<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tech Blue • Node Engine V1.3 (Trading Command Center)</title>
<meta name="color-scheme" content="dark">
<style>
  :root{
    --bg0:#060a16;
    --bg1:#0b1020;
    --panel:#0f1630cc;
    --panel2:#0b1430cc;
    --line:rgba(79,155,255,.28);
    --text:#eaf2ff;
    --muted:#9eb8ff;
    --accent:#1f8bff;
    --accent2:#4ac3ff;
    --good:#20c997; --warn:#ffb020; --bad:#ef476f;
    --shadow: 0 18px 50px rgba(0,0,0,.55);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    background: radial-gradient(1200px 800px at 20% 10%, rgba(31,139,255,.22), transparent 60%),
                radial-gradient(1100px 700px at 85% 35%, rgba(74,195,255,.12), transparent 65%),
                linear-gradient(160deg, var(--bg0) 0%, var(--bg1) 40%, #071029 100%);
    color:var(--text);
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    overflow:hidden;
  }

  header{
    position:fixed; inset:10px 10px auto 10px;
    display:flex; align-items:center; justify-content:space-between;
    gap:10px;
    z-index:30;
    pointer-events:none;
  }
  .brand{
    pointer-events:auto;
    display:flex; align-items:center; gap:10px;
    background: linear-gradient(180deg, rgba(15,22,48,.75), rgba(11,20,48,.55));
    border:1px solid var(--line);
    border-radius:18px;
    padding:10px 12px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(10px);
  }
  .logo{
    width:34px;height:34px;border-radius:12px;
    border:1px solid rgba(255,255,255,.10);
    background:
      radial-gradient(10px 10px at 30% 30%, rgba(255,255,255,.18), transparent 60%),
      linear-gradient(135deg, rgba(31,139,255,.35), rgba(74,195,255,.15));
  }
  .brand b{font-size:13px; letter-spacing:.2px}
  .brand small{display:block; color:var(--muted); font-size:11px; margin-top:1px}

  .barActions{
    pointer-events:auto;
    display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end;
    align-items:center;
  }
  .btn{
    border:1px solid var(--line);
    background: rgba(10,18,40,.55);
    color:var(--text);
    padding:9px 10px;
    border-radius:14px;
    cursor:pointer;
    font-size:12px;
    box-shadow: 0 10px 30px rgba(0,0,0,.30);
    backdrop-filter: blur(10px);
    user-select:none;
  }
  .btn:hover{border-color: rgba(79,155,255,.55)}
  .btn:active{transform: translateY(1px)}
  .btn.bad{border-color: rgba(239,71,111,.35)}
  .btn.good{border-color: rgba(32,201,151,.35)}
  .btn.warn{border-color: rgba(255,176,32,.35)}
  .pill{
    border:1px solid rgba(79,155,255,.25);
    background: rgba(10,18,40,.55);
    color:var(--text);
    padding:7px 10px;
    border-radius:999px;
    font-size:12px;
    display:flex; align-items:center; gap:8px;
  }
  .pill select{
    padding:6px 8px;
    border-radius:999px;
    border:1px solid rgba(79,155,255,.22);
    background: rgba(2,8,20,.45);
    color: var(--text);
    outline:none;
    font-size:12px;
  }

  #stage{ position:absolute; inset:0; overflow:hidden; }
  #wires{ position:absolute; inset:0; z-index:5; pointer-events:none; }
  #nodes{ position:absolute; inset:0; z-index:10; }

  .node{
    position:absolute;
    width: 320px;
    max-width: min(92vw, 520px);
    border-radius: 20px;
    border:1px solid var(--line);
    background: linear-gradient(180deg, rgba(15,22,48,.78), rgba(11,20,48,.55));
    box-shadow: var(--shadow);
    backdrop-filter: blur(10px);
    overflow:hidden;
    user-select:none;
    transform: translate3d(0,0,0);
  }
  .node[data-type="core"]{ width: 360px; }
  .node[data-type="chart"]{ width: 360px; }
  .node[data-type="multichart"]{ width: 520px; }

  .nodeHead{
    padding:10px 12px;
    display:flex; align-items:center; justify-content:space-between;
    gap:10px;
    border-bottom: 1px solid rgba(79,155,255,.18);
    background: radial-gradient(900px 300px at 20% 0%, rgba(31,139,255,.20), transparent 60%);
    cursor: grab;
  }
  .nodeHead:active{cursor:grabbing}
  .nodeTitle{ display:flex; align-items:center; gap:10px; min-width:0; }
  .chip{
    font-size:11px;
    padding:5px 8px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.10);
    color:var(--muted);
    background: rgba(255,255,255,.04);
    white-space:nowrap;
  }
  .nodeTitle b{
    font-size:12.5px;
    letter-spacing:.2px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width: 260px;
  }
  .nodeTools{ display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; }
  .mini{
    border:1px solid rgba(79,155,255,.20);
    background: rgba(0,0,0,.18);
    color:var(--text);
    padding:6px 8px;
    border-radius:12px;
    cursor:pointer;
    font-size:12px;
    user-select:none;
  }
  .mini:hover{border-color: rgba(79,155,255,.55)}
  .mini:active{transform: translateY(1px)}

  .nodeBody{ padding:10px 12px 12px; user-select:text; }
  .row{display:flex; gap:8px; flex-wrap:wrap; align-items:center}
  .field{
    display:flex; flex-direction:column; gap:6px;
    min-width: 120px;
    flex: 1 1 140px;
  }
  label{font-size:11px; color:var(--muted)}
  input,select,textarea{
    width:100%;
    padding:9px 10px;
    border-radius:14px;
    border:1px solid rgba(79,155,255,.22);
    background: rgba(2,8,20,.45);
    color:var(--text);
    outline:none;
  }
  textarea{min-height:78px; resize:vertical}

  .hint{color:var(--muted); font-size:11px; line-height:1.35}
  .list{ margin-top:10px; display:grid; gap:8px; }
  .item{
    padding:10px 10px;
    border-radius:14px;
    border:1px solid rgba(79,155,255,.16);
    background: rgba(0,0,0,.15);
  }
  .item a{color:var(--accent2); text-decoration:none}
  .item a:hover{text-decoration:underline}
  .item small{color:var(--muted)}
  .tags{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;}
  .tag{
    border:1px solid rgba(79,155,255,.18);
    background: rgba(0,0,0,.14);
    padding:7px 10px;
    border-radius:999px;
    cursor:pointer;
    font-size:12px;
    color: var(--text);
    user-select:none;
  }
  .tag:hover{border-color: rgba(79,155,255,.55)}
  .tag:active{transform: translateY(1px)}

  .tvBox{
    margin-top:10px;
    border-radius:16px;
    border:1px solid rgba(79,155,255,.18);
    overflow:hidden;
    background: rgba(0,0,0,.15);
  }
  .tvBox .tvInner{height: 420px; width:100%;}
  .node[data-type="core"] .tvBox .tvInner{height: 300px;}

  #toast{
    position:fixed;
    left:10px; bottom:10px;
    z-index:40;
    max-width:min(720px, 92vw);
    padding:10px 12px;
    border-radius:16px;
    border:1px solid var(--line);
    background: rgba(10,18,40,.65);
    color:var(--text);
    box-shadow: var(--shadow);
    backdrop-filter: blur(10px);
    font-size:12px;
  }
  #toast b{color:var(--accent2)}

  /* ========= Multi-Chart Layouts + Manual Resize ========= */
  .mcWrap{ --splitX:.50; --splitY:.50; --big:.62; position:relative; margin-top:10px; }
  .mcGrid{ display:grid; gap:10px; position:relative; height:520px; }
  .mcGrid.layout-2x2{
    grid-template-columns: calc(var(--splitX)*100%) calc((1 - var(--splitX))*100%);
    grid-template-rows: calc(var(--splitY)*100%) calc((1 - var(--splitY))*100%);
  }
  .mcGrid.layout-3-big-left{
    grid-template-columns: calc(var(--big)*100%) calc((1 - var(--big))*100%);
    grid-template-rows: 1fr 1fr;
  }
  .mcGrid.layout-3-big-left .mcCell.big{ grid-column:1; grid-row:1 / span 2; }
  .mcGrid.layout-3-big-top{
    grid-template-columns: 1fr 1fr;
    grid-template-rows: calc(var(--big)*100%) calc((1 - var(--big))*100%);
  }
  .mcGrid.layout-3-big-top .mcCell.big{ grid-column:1 / span 2; grid-row:1; }
  .mcGrid.layout-2-side{
    grid-template-columns: calc(var(--splitX)*100%) calc((1 - var(--splitX))*100%);
    grid-template-rows: 1fr;
  }
  .mcGrid.layout-2-stack{
    grid-template-columns: 1fr;
    grid-template-rows: calc(var(--splitY)*100%) calc((1 - var(--splitY))*100%);
  }
  .mcGrid.layout-1big-3strip{
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: calc(var(--big)*100%) calc((1 - var(--big))*100%);
  }
  .mcGrid.layout-1big-3strip .mcCell.big{ grid-column:1 / span 3; grid-row:1; }
  .mcGrid.layout-1big-2right{
    grid-template-columns: calc(var(--big)*100%) calc((1 - var(--big))*100%);
    grid-template-rows: 1fr 1fr;
  }
  .mcGrid.layout-1big-2right .mcCell.big{ grid-column:1; grid-row:1 / span 2; }

  .mcCell{
    border-radius:16px;
    border:1px solid rgba(79,155,255,.18);
    overflow:hidden;
    background: rgba(0,0,0,.15);
    display:flex;
    flex-direction:column;
    min-height: 160px;
  }
  .mcHead{
    padding:8px 10px;
    border-bottom:1px solid rgba(79,155,255,.14);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    background: rgba(10,18,40,.40);
  }
  .mcHead b{font-size:12px}
  .mcHead small{color:var(--muted); font-size:11px}
  .mcBody{flex:1; min-height:0;}
  .mcBody > div{height:100%;}

  .gutter{
    position:absolute; z-index:20;
    background: rgba(79,155,255,.10);
    border:1px solid rgba(79,155,255,.18);
    border-radius:999px;
    backdrop-filter: blur(6px);
  }
  .gutter:hover{ background: rgba(79,155,255,.18); border-color: rgba(79,155,255,.35); }
  .gutter.v{ width: 10px; cursor: col-resize; top: 6px; bottom: 6px; }
  .gutter.h{ height: 10px; cursor: row-resize; left: 6px; right: 6px; }
  .gutterDot{
    position:absolute; left:50%; top:50%;
    transform: translate(-50%,-50%);
    width:22px; height:22px; border-radius:999px;
    border:1px solid rgba(255,255,255,.10);
    background: radial-gradient(8px 8px at 30% 30%, rgba(255,255,255,.18), transparent 60%),
              linear-gradient(135deg, rgba(31,139,255,.35), rgba(74,195,255,.12));
  }
</style>

<body>

<header>

    <div class="logo" aria-hidden="true"></div>
    <div>
      <b>Tech Blue • Node Engine</b>
      <small>Trading Command Center — V1.3</small>
    </div>
  </div>

  <div class="barActions">
    <div class="pill">
      Workspace:
      <select id="workspaceSel" title="Reordena nodos por sesión">
        <option value="free">Free</option>

        <option value="research">Research</option>
      </select>
      <button class="btn" id="btnWorkspace">⚡ Apply</button>

    <button class="btn good" id="btnAddChart">➕ Chart</button>
    <button class="btn good" id="btnAddMulti">➕ Multi-Chart</button>

  <svg id="wires"></svg>
  <div id="nodes"></div>
</div>

<div id="toast">
  <b>Tips:</b> Arrastra el header del nodo. <b>＋</b> crea nodos hijos.
  Multi-Chart tiene presets + resize manual. CORE puede <b>Sync All Charts</b>.
</div>

<script>


const STORE_KEY = "techblue_node_engine_v1_3";

/* Utils */
const $ = (q, el=document)=>el.querySelector(q);
const $$ = (q, el=document)=>Array.from(el.querySelectorAll(q));
const clamp = (v,min,max)=>Math.max(min, Math.min(max,v));
const uid = ()=>"n_"+Math.random().toString(16).slice(2)+"_"+Date.now().toString(16);
const safeText = (s)=> (s||"").toString().replace(/[<>&"]/g, m=>({ "<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;" }[m]));
const nowISO = ()=> new Date().toISOString();
const allOrigins = (url)=> "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);

function stageRect(){ return $("#stage").getBoundingClientRect(); }
function centerOf(el){
  const r = el.getBoundingClientRect();
  return { x: r.left + r.width/2, y: r.top + r.height/2, w:r.width, h:r.height };
}
function intersects(a,b,pad=12){
  return !(
    a.x + a.w + pad < b.x ||
    a.x > b.x + b.w + pad ||
    a.y + a.h + pad < b.y ||
    a.y > b.y + b.h + pad
  );
}

/* Engine */
const Engine = {
  nodes: new Map(),
  edges: [],
  z: 20,
  golden: 2.399963229728653,
  alertTimers: new Map()
};

function defaultNodeState(type){
  if(type==="core")  return { title:"CORE", symbol:"OANDA:EURUSD", interval:"15" };
  if(type==="chart") return { title:"Chart", symbol:"OANDA:EURUSD", interval:"60" };

  if(type==="multichart") return {
    title:"Multi-Chart",
    symbol:"OANDA:EURUSD",
    cells:["240","60","15","1"],
    layout:"2x2",
    splitX:0.52,
    splitY:0.52,
    big:0.62
  };

  if(type==="news")  return { title:"News", feed:"myfxbook_news", limit:10, filter:"" };
  if(type==="calendar") return { title:"Calendar", feed:"myfxbook_calendar", limit:15, filter:"USD" };
  if(type==="notes") return { title:"Notes", text:"Ideas / plan / checklist…" };

  if(type==="watchlist") return {
    title:"Watchlist",
    items:"OANDA:EURUSD\nOANDA:GBPUSD\nOANDA:USDJPY\nOANDA:XAUUSD\nBINANCE:BTCUSDT\nBINANCE:ETHUSDT",
  };

  if(type==="snapshots") return { title:"Snapshots", list:[] };

  if(type==="strategy") return { title:"Strategy", template:"ema_smc", notes:"", lastRun:"" };

  if(type==="alerts") return {
    title:"Alerts",
    enabled:false,
    mode:"crypto",
    symbol:"bitcoin",
    manualPrice:"",
    everySec:15,
    rules:[]
  };

  return { title:"Node" };
}

function getNodeEl(id){ return document.querySelector(`.node[data-id="${id}"]`); }
function syncNodeDOM(id){
  const m = Engine.nodes.get(id);
  const el = getNodeEl(id);
  if(!m || !el) return;
  el.style.left = m.x + "px";
  el.style.top  = m.y + "px";
  el.style.width = m.w + "px";
}

function smartPlaceAroundParent(childId, parentId){
  const child = Engine.nodes.get(childId);
  const parent = Engine.nodes.get(parentId);
  if(!child || !parent) return;

  const sr = stageRect();
  const parentEl = getNodeEl(parentId);
  const pBox = parentEl ? centerOf(parentEl) : {x: parent.x + parent.w/2, y: parent.y + parent.h/2};

  let radius = 40;
  let tries = 0;
  parent.angleIndex = (parent.angleIndex ?? 0) + 1;
  const baseAngle = parent.angleIndex * Engine.golden;

  while(tries < 90){
    const a = baseAngle + tries * 0.35;
    const cx = pBox.x + Math.cos(a) * radius;
    const cy = pBox.y + Math.sin(a) * radius;

    const x = cx - child.w/2;
    const y = cy - 44;

    const candidate = {
      x: clamp(x, 10, sr.width - child.w - 10),
      y: clamp(y, 64, sr.height - child.h - 10),
      w: child.w, h: child.h
    };

    let ok = true;
    for(const [id, n] of Engine.nodes){
      if(id === childId) continue;
      if(intersects(candidate, {x:n.x,y:n.y,w:n.w,h:n.h}, 14)){ ok=false; break; }
    }

    if(ok){ child.x=candidate.x; child.y=candidate.y; return; }

    tries++;
    if(tries % 10 === 0) radius += 55;
  }

  child.x = clamp(parent.x + parent.w + 20, 10, sr.width - child.w - 10);
  child.y = clamp(parent.y, 64, sr.height - child.h - 10);
}

/* =========================================================
   Node creation + Body renderer
========================================================= */
function createNode({type="notes", parentId=null, x=null, y=null, state=null}){
  const id = uid();
  const st = state ? {...defaultNodeState(type), ...state} : defaultNodeState(type);

  let w =
    (type==="core") ? 360 :
    (type==="chart") ? 360 :
    (type==="multichart") ? 520 :
    320;

  let h =
    (type==="multichart") ? 720 :
    (type==="chart") ? 620 :
    (type==="news") ? 460 :
    (type==="calendar") ? 480 :
    (type==="watchlist") ? 420 :
    (type==="snapshots") ? 460 :
    (type==="strategy") ? 450 :
    (type==="alerts") ? 520 :
    320;

  const nodeModel = { id, type, parentId, x:x ?? 100, y:y ?? 100, w, h, state:st, createdAt:Date.now(), angleIndex:0 };

  const el = document.createElement("div");
  el.className = "node";
  el.dataset.id = id;
  el.dataset.type = type;
  el.style.width = w + "px";
  el.style.zIndex = (++Engine.z).toString();

  el.innerHTML = `
    <div class="nodeHead" data-drag>
      <div class="nodeTitle">
        <span class="chip">${type.toUpperCase()}</span>
        <b data-title>${safeText(st.title || type)}</b>
      </div>
      <div class="nodeTools">
        <button class="mini" title="Crear nodo hijo" data-act="spawn">＋</button>
        ${type==="core" ? "" : `<button class="mini" title="Traer al frente" data-act="front">⬆</button>`}
        ${type==="core" ? "" : `<button class="mini" title="Eliminar" data-act="del">✕</button>`}
      </div>
    </div>
    <div class="nodeBody">
      ${renderBody(type, id, st)}
    </div>
  `;

  $("#nodes").appendChild(el);
  Engine.nodes.set(id, nodeModel);

  if(parentId){
    smartPlaceAroundParent(id, parentId);
    Engine.edges.push({from: parentId, to: id});
  }else{
    const sr = stageRect();
    nodeModel.x = clamp(nodeModel.x, 10, sr.width - w - 10);
    nodeModel.y = clamp(nodeModel.y, 64, sr.height - h - 10);
  }

  syncNodeDOM(id);
  bindNode(id);

  // init
  if(type==="chart" || type==="core") renderTradingViewWidgetSimple(id);
  if(type==="multichart") { renderMultiChart(id); applyMultiLayout(id); bindMultiResize(id); }
  if(type==="news" || type==="calendar") loadFeed(id);
  if(type==="watchlist") renderWatchlistTags(id);
  if(type==="snapshots") renderSnapshots(id);
  if(type==="alerts") renderAlerts(id);

  drawWires();
  return id;
}

function renderBody(type, id, st){
  if(type==="core" || type==="chart"){
    const isCore = type==="core";
    return `
      <div class="row">
        <div class="field">
          <label>Symbol (TradingView)</label>
          <input data-k="symbol" value="${safeText(st.symbol)}">
        </div>
        <div class="field">
          <label>Timeframe</label>
          <select data-k="interval">
            ${["1","5","15","30","60","240","D","W"].map(v=>{
              const name = ({ "1":"1m","5":"5m","15":"15m","30":"30m","60":"1H","240":"4H","D":"1D","W":"1W" }[v]||v);
              return `<option value="${v}" ${String(st.interval)===String(v)?"selected":""}>${name}</option>`;
            }).join("")}
          </select>
        </div>
      </div>

      <div class="row" style="margin-top:8px">
        <button class="btn" style="padding:9px 10px;border-radius:14px" data-act="tvApply">🔄 Apply</button>
        <button class="btn" style="padding:9px 10px;border-radius:14px" data-act="spawnChartChild">＋ Spawn Chart Child</button>
        ${isCore ? `<button class="btn good" style="padding:9px 10px;border-radius:14px" data-act="syncAll">🧲 Sync All Charts</button>` : ``}
        <span class="hint">${isCore ? "CORE recomienda par/timeframe y sincroniza charts." : "Chart independiente."}</span>
      </div>

      <div class="tvBox">
        <div class="tvInner" id="tv_${id}"></div>
      </div>
    `;
  }

  if(type==="multichart"){
    const cells = Array.isArray(st.cells) ? st.cells : ["240","60","15","1"];
    const labels = ["A","B","C","D"];
    const layout = (st.layout || "2x2");
    return `
      <div class="row">
        <div class="field" style="flex:2 1 240px">
          <label>Symbol (TradingView)</label>
          <input data-k="symbol" value="${safeText(st.symbol)}">
        </div>
        <div class="field" style="min-width:200px;flex:1 1 200px">
          <label>Layout preset</label>
          <select data-k="layout">
            <option value="2x2" ${layout==="2x2"?"selected":""}>4 charts • 2x2</option>
            <option value="3-big-left" ${layout==="3-big-left"?"selected":""}>3 charts • big left + 2 right</option>
            <option value="3-big-top" ${layout==="3-big-top"?"selected":""}>3 charts • big top + 2 bottom</option>

/* =========================================================
   Bind + State
========================================================= */
function pullFieldsIntoState(id){
  const el = getNodeEl(id);
  const m = Engine.nodes.get(id);
  if(!el || !m) return;

  $$("[data-k]", el).forEach(inp=>{
    const k = inp.dataset.k;
    let v = inp.value;

    if(inp.tagName==="SELECT"){
      if(k==="limit") v = Number(v);
      if(k==="everySec") v = Number(v);
      if(k==="enabled") v = (String(v)==="true");
    }

    // multichart cells
    if(m.type==="multichart" && k.startsWith("cell_")){
      const idx = Number(k.split("_")[1]);
      const cells = Array.isArray(m.state.cells) ? m.state.cells.slice() : ["240","60","15","1"];
      cells[idx] = String(v);
      m.state.cells = cells;
      return;
    }

    m.state[k] = v;
  });
}

function spawnMenu(parentId){
  const pick = prompt(
`Crear nodo hijo:
1 = Chart
2 = Multi-Chart
3 = News
4 = Calendar
5 = Notes
6 = Watchlist
7 = Snapshots
8 = Strategy
9 = Alerts

Escribe 1-9:`
  );
  if(pick===null) return;
  const p = pick.trim();
  const map = { "1":"chart","2":"multichart","3":"news","4":"calendar","5":"notes","6":"watchlist","7":"snapshots","8":"strategy","9":"alerts" };
  if(map[p]) return createNode({type:map[p], parentId});
}

function removeNode(id){
  stopAlerts(id);
  Engine.edges = Engine.edges.filter(e => e.from!==id && e.to!==id);
  Engine.nodes.delete(id);
  const el = getNodeEl(id);
  if(el) el.remove();
  drawWires();
  saveAuto();
}

function bindNode(id){
  const el = getNodeEl(id);
  const m = Engine.nodes.get(id);
  if(!el || !m) return;

  el.addEventListener("pointerdown", ()=>{ el.style.zIndex = (++Engine.z).toString(); });

  el.addEventListener("click", (e)=>{
    const btn = e.target.closest("[data-act]");
    if(!btn) return;
    const act = btn.dataset.act;

    if(act==="front"){ el.style.zIndex = (++Engine.z).toString(); return; }
    if(act==="del"){ if(confirm("¿Eliminar este nodo y sus conexiones?")) removeNode(id); return; }
    if(act==="spawn"){ spawnMenu(id); return; }

    if(act==="tvApply"){ pullFieldsIntoState(id); renderTradingViewWidgetSimple(id); saveAuto(); return; }
    if(act==="syncAll"){ pullFieldsIntoState(id); syncAllChartsFromCore(id); saveAuto(); return; }
    if(act==="spawnChartChild"){
      pullFieldsIntoState(id);
      createNode({type:"chart", parentId:id, state:{symbol:m.state.symbol, interval:m.state.interval, title:"Chart Child"}});
      saveAuto(); return;
    }

    if(act==="feedRefresh"){ pullFieldsIntoState(id); loadFeed(id); saveAuto(); return; }
    if(act==="spawnFeedChild"){
      pullFieldsIntoState(id);
      const childType = (m.state.feed==="myfxbook_calendar") ? "calendar" : "news";
      createNode({type:childType, parentId:id, state:{feed:m.state.feed, limit:m.state.limit, filter:m.state.filter, title:(childType==="calendar"?"Calendar Child":"News Child")}});
      saveAuto(); return;
    }

    if(act==="watchRender"){ pullFieldsIntoState(id); renderWatchlistTags(id); saveAuto(); return; }
    if(act==="spawnWatchChild"){ pullFieldsIntoState(id); createNode({type:"watchlist", parentId:id, state:{items:m.state.items, title:"Watch Child"}}); saveAuto(); return; }

    if(act==="snapSave"){ saveSnapshot(id); saveAuto(); return; }
    if(act==="snapExport"){ exportSnapshots(id); return; }
    if(act==="snapClear"){ if(confirm("¿Borrar snapshots?")){ Engine.nodes.get(id).state.list=[]; renderSnapshots(id); saveAuto(); } return; }

    if(act==="stratRun"){ pullFieldsIntoState(id); runStrategy(id); saveAuto(); return; }
    if(act==="spawnStratChild"){ pullFieldsIntoState(id); createNode({type:"strategy", parentId:id, state:{template:m.state.template, title:"Strategy Child"}}); saveAuto(); return; }

    if(act==="alertAdd"){ pullFieldsIntoState(id); addAlertRule(id); saveAuto(); return; }
    if(act==="alertTest"){ testNotify("Tech Blue Alerts", "Test OK ✅"); return; }
    if(act==="alertRun"){ pullFieldsIntoState(id); startAlerts(id); saveAuto(); return; }
    if(act==="alertStop"){ stopAlerts(id); saveAuto(); return; }

    if(act==="multiApply"){ pullFieldsIntoState(id); renderMultiChart(id); applyMultiLayout(id); bindMultiResize(id); saveAuto(); return; }
    if(act==="mcSpawn"){
      pullFieldsIntoState(id);
      const i = Number(btn.dataset.i);
      const tf = (Engine.nodes.get(id)?.state?.cells?.[i] || "15");
      const sym = (Engine.nodes.get(id)?.state?.symbol || "OANDA:EURUSD");
      createNode({type:"chart", parentId:id, state:{title:`Cell ${"ABCD"[i]}`, symbol:sym, interval:String(tf)}});
      saveAuto(); return;
    }
    if(act==="multiSpawnPack"){
      pullFieldsIntoState(id);
      const mm = Engine.nodes.get(id);
      const sym = (mm.state.symbol || "OANDA:EURUSD");
      const cells = getMultiCellsFromState(mm.state);
      for(let i=0;i<4;i++){
        createNode({type:"chart", parentId:id, state:{title:`Pack ${"ABCD"[i]}`, symbol:sym, interval:String(cells[i])}});
      }
      saveAuto(); return;
    }
    if(act==="spawnNoteChild"){ pullFieldsIntoState(id); createNode({type:"notes", parentId:id, state:{title:"Notes Child", text:""}}); saveAuto(); return; }
  });

  // drag
  const head = el.querySelector("[data-drag]");
  let dragging=false, sx=0, sy=0, ox=0, oy=0;

  head.addEventListener("pointerdown", (e)=>{
    dragging=true;
    head.setPointerCapture(e.pointerId);
    sx=e.clientX; sy=e.clientY;
    ox=m.x; oy=m.y;
  });

  head.addEventListener("pointermove", (e)=>{
    if(!dragging) return;
    const sr = stageRect();
    m.x = clamp(ox + (e.clientX - sx), 10, sr.width - m.w - 10);
    m.y = clamp(oy + (e.clientY - sy), 64, sr.height - m.h - 10);
    syncNodeDOM(id);
    drawWires();
  });

  head.addEventListener("pointerup", (e)=>{
    dragging=false;
    try{ head.releasePointerCapture(e.pointerId); }catch(_){}
    // refresh multichart after move (keeps gutters aligned)
    if(m.type==="multichart"){ applyMultiLayout(id); }
    saveAuto();
  });

  el.addEventListener("change", (e)=>{
    if(!e.target.matches("input[data-k],select[data-k],textarea[data-k]")) return;

    pullFieldsIntoState(id);

    const nm = Engine.nodes.get(id);
    const titleEl = el.querySelector("[data-title]");
    if(titleEl) titleEl.textContent = nm.state.title || nm.type.toUpperCase();

    if(nm.type==="chart" || nm.type==="core") renderTradingViewWidgetSimple(id);
    if(nm.type==="multichart"){ renderMultiChart(id); applyMultiLayout(id); bindMultiResize(id); }
    if(nm.type==="news" || nm.type==="calendar") loadFeed(id);
    if(nm.type==="watchlist") renderWatchlistTags(id);
    if(nm.type==="snapshots") renderSnapshots(id);
    if(nm.type==="alerts") renderAlerts(id);

    saveAuto();
  });
}

/* =========================================================
   Wires
========================================================= */
function drawWires(){
  const svg = $("#wires");
  const sr = stageRect();
  svg.setAttribute("width", sr.width);
  svg.setAttribute("height", sr.height);
  svg.setAttribute("viewBox", `0 0 ${sr.width} ${sr.height}`);
  svg.innerHTML = "";

  const defs = document.createElementNS("http://www.w3.org/2000/svg","defs");
  defs.innerHTML = `
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  `;
  svg.appendChild(defs);

  for(const e of Engine.edges){
    const aEl = getNodeEl(e.from);
    const bEl = getNodeEl(e.to);
    if(!aEl || !bEl) continue;

    const A = centerOf(aEl);
    const B = centerOf(bEl);

    const ax = (A.x - sr.left);
    const ay = (A.y - sr.top);
    const bx = (B.x - sr.left);
    const by = (B.y - sr.top);

    const dx = Math.abs(bx-ax);
    const c1x = ax + dx * 0.35;
    const c2x = bx - dx * 0.35;

    const path = document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d", `M ${ax} ${ay} C ${c1x} ${ay}, ${c2x} ${by}, ${bx} ${by}`);
    path.setAttribute("fill","none");
    path.setAttribute("stroke","rgba(79,155,255,.45)");
    path.setAttribute("stroke-width","2");
    path.setAttribute("filter","url(#glow)");
    svg.appendChild(path);

    const dot = document.createElementNS("http://www.w3.org/2000/svg","circle");
    dot.setAttribute("cx", bx);
    dot.setAttribute("cy", by);
    dot.setAttribute("r", "4");
    dot.setAttribute("fill","rgba(74,195,255,.85)");
    dot.setAttribute("filter","url(#glow)");
    svg.appendChild(dot);
  }
}

window.addEventListener("resize", ()=>{
  const sr = stageRect();
  for(const [id, m] of Engine.nodes){
    m.x = clamp(m.x, 10, sr.width - m.w - 10);
    m.y = clamp(m.y, 64, sr.height - m.h - 10);
    syncNodeDOM(id);
  }
  drawWires();
  // re-align multi gutters
  for(const [id,m] of Engine.nodes){
    if(m.type==="multichart") applyMultiLayout(id);
  }
});

/* =========================================================
   TradingView embed (single chart) + MultiChart cell embed
========================================================= */
function renderTradingViewWidgetInto(mount, symbol, interval){
  if(!mount) return;

  while(mount.firstChild) mount.removeChild(mount.firstChild);
  const inner = document.createElement("div");
  inner.style.width="100%";
  inner.style.height="100%";
  mount.appendChild(inner);

  const cfg = {
    autosize: true,
    symbol: (symbol||"OANDA:EURUSD").toString().trim() || "OANDA:EURUSD",
    interval: (interval||"60").toString().trim() || "60",
    timezone: "Etc/UTC",
    theme: "dark",
    style: "1",
    locale: "en",
    enable_publishing: false,
    hide_top_toolbar: false,
    hide_legend: false,
    allow_symbol_change: true,
    save_image: true,
    calendar: true,
    support_host: "https://www.tradingview.com"
  };

  const script = document.createElement("script");
  script.type = "text/javascript";
  script.src = "https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js";
  script.async = true;
  script.text = JSON.stringify(cfg);

  requestAnimationFrame(()=> inner.appendChild(script));
}

function renderTradingViewWidgetSimple(nodeId){
  const m = Engine.nodes.get(nodeId);
  if(!m) return;
  const mount = document.getElementById("tv_" + nodeId);
  if(!mount) return;
  renderTradingViewWidgetInto(mount, m.state.symbol, m.state.interval);
}

/* Multi-Chart helpers */
function getMultiCellsFromState(st){
  const base = Array.isArray(st.cells) ? st.cells.slice(0,4) : ["240","60","15","1"];
  while(base.length<4) base.push("15");
  return base.map(v=>String(v||"15"));
}
function renderMultiChart(nodeId){
  const m = Engine.nodes.get(nodeId);
  if(!m) return;

  const sym = (m.state.symbol || "OANDA:EURUSD").toString().trim() || "OANDA:EURUSD";
  const cells = getMultiCellsFromState(m.state);
  m.state.cells = cells;

  for(let i=0;i<4;i++){
    const mount = document.getElementById(`tv_${nodeId}_${i}`);
    if(mount) renderTradingViewWidgetInto(mount, sym, cells[i]);
    const lbl = document.getElementById(`mc_lbl_${nodeId}_${i}`);
    if(lbl) lbl.textContent = String(cells[i]);
  }
}

/* Multi layout apply + gutters */
function applyMultiLayout(nodeId){
  const m = Engine.nodes.get(nodeId);
  const wrap = document.getElementById(`mcWrap_${nodeId}`);
  const grid = document.getElementById(`mcGrid_${nodeId}`);
  const gutV = document.getElementById(`mcGutV_${nodeId}`);
  const gutH = document.getElementById(`mcGutH_${nodeId}`);
  if(!m || !wrap || !grid || !gutV || !gutH) return;

  const sx  = clamp(Number(m.state.splitX ?? 0.52), 0.15, 0.85);
  const sy  = clamp(Number(m.state.splitY ?? 0.52), 0.15, 0.85);
  const big = clamp(Number(m.state.big ?? 0.62), 0.45, 0.80);

  wrap.style.setProperty("--splitX", sx);
  wrap.style.setProperty("--splitY", sy);
  wrap.style.setProperty("--big", big);

  const layout = (m.state.layout || "2x2");
  grid.className = `mcGrid layout-${layout}`;

  const cells = Array.from(grid.querySelectorAll(".mcCell"));
  const show = (idx, yes)=>{ if(cells[idx]) cells[idx].style.display = yes ? "" : "none"; };

  // defaults
  show(0,true); show(1,true); show(2,true); show(3,true);
  gutV.style.display="none";
  gutH.style.display="none";

  const rect = grid.getBoundingClientRect();
  const setV = (ratio)=>{ gutV.style.left = (rect.width * ratio - 5) + "px"; };
  const setH = (ratio)=>{ gutH.style.top  = (rect.height * ratio - 5) + "px"; };

  if(layout==="2x2"){ gutV.style.display=""; gutH.style.display=""; setV(sx); setH(sy); }
  else if(layout==="2-side"){ show(2,false); show(3,false); gutV.style.display=""; setV(sx); }
  else if(layout==="2-stack"){ show(2,false); show(3,false); gutH.style.display=""; setH(sy); }
  else if(layout==="3-big-left"){ show(3,false); gutV.style.display=""; setV(big); }
  else if(layout==="3-big-top"){ show(3,false); gutH.style.display=""; setH(big); }
  else if(layout==="1big-2right"){ show(3,false); gutV.style.display=""; setV(big); }
  // 1big-3strip has no gutters (optional)
}

function bindMultiResize(nodeId){
  const m = Engine.nodes.get(nodeId);
  const grid = document.getElementById(`mcGrid_${nodeId}`);
  const gutV = document.getElementById(`mcGutV_${nodeId}`);
  const gutH = document.getElementById(`mcGutH_${nodeId}`);
  if(!m || !grid || !gutV || !gutH) return;

  // prevent double binding
  if(gutV.dataset.bound==="1" && gutH.dataset.bound==="1") return;
  gutV.dataset.bound="1";
  gutH.dataset.bound="1";

  const drag = (gut, axis)=>{
    let dragging=false, start=0, startVal=0, rect=null, layout=null;

    gut.addEventListener("pointerdown", (e)=>{
      dragging=true;
      gut.setPointerCapture(e.pointerId);
      rect = grid.getBoundingClientRect();
      layout = (m.state.layout || "2x2");
      start = axis==="x" ? e.clientX : e.clientY;

      if(layout==="3-big-left" || layout==="3-big-top" || layout==="1big-2right"){
        startVal = Number(m.state.big ?? 0.62);
      }else{
        startVal = axis==="x" ? Number(m.state.splitX ?? 0.52) : Number(m.state.splitY ?? 0.52);
      }
    });

    gut.addEventListener("pointermove", (e)=>{
      if(!dragging) return;
      const cur = axis==="x" ? e.clientX : e.clientY;
      const delta = cur - start;
      const size = axis==="x" ? rect.width : rect.height;

      let ratio = clamp(startVal + (delta / size), 0.15, 0.85);

      if(layout==="3-big-left" || layout==="3-big-top" || layout==="1big-2right"){
        m.state.big = clamp(ratio, 0.45, 0.80);
      }else{
        if(axis==="x") m.state.splitX = ratio;
        else m.state.splitY = ratio;
      }

      applyMultiLayout(nodeId);
      saveAuto();
    });

    gut.addEventListener("pointerup", (e)=>{
      dragging=false;
      try{ gut.releasePointerCapture(e.pointerId); }catch(_){}
      // after resize, re-render charts so they fit perfect
      renderMultiChart(nodeId);
      applyMultiLayout(nodeId);
      saveAuto();
    });
  };

  drag(gutV, "x");
  drag(gutH, "y");
}

function syncAllChartsFromCore(coreId){
  const core = Engine.nodes.get(coreId);

  const sym = (core.state.symbol||"").trim();

  for(const [id, n] of Engine.nodes){

      n.state.symbol = sym;
      n.state.interval = tf;
      const el = getNodeEl(id);

        const symInp = el.querySelector('input[data-k="symbol"]');

      renderMultiChart(id);
      applyMultiLayout(id);

const FEEDS = {
  myfxbook_news: "https://www.myfxbook.com/rss/latest-forex-news",
  myfxbook_calendar: "https://www.myfxbook.com/rss/forex-economic-calendar-events"
};

async function loadFeed(nodeId){
  const m = Engine.nodes.get(nodeId);
  const box = document.getElementById("feed_" + nodeId);
  if(!m || !box) return;

  const feedUrl = FEEDS[m.state.feed] || FEEDS.myfxbook_news;
  const limit = Number(m.state.limit || 10);
  const filter = (m.state.filter||"").trim().toLowerCase();

  box.innerHTML = `<div class="item"><small>Cargando…</small></div>`;

  try{
    const xmlText = await fetch(allOrigins(feedUrl), {cache:"no-store"}).then(r=>r.text());
    const doc = new DOMParser().parseFromString(xmlText, "text/xml");
    let items = Array.from(doc.querySelectorAll("item"));

    if(filter){
      items = items.filter(it=>{
        const title = (it.querySelector("title")?.textContent||"").toLowerCase();
        const desc  = (it.querySelector("description")?.textContent||"").toLowerCase();
        return title.includes(filter) || desc.includes(filter);
      });
    }

    items = items.slice(0, limit);

    if(!items.length){
      box.innerHTML = `<div class="item"><small>No hay items con ese filtro.</small></div>`;
      return;
    }

    box.innerHTML = items.map(it=>{
      const title = it.querySelector("title")?.textContent?.trim() || "Untitled";
      const link  = it.querySelector("link")?.textContent?.trim() || "#";
      const pub   = it.querySelector("pubDate")?.textContent?.trim() || "";
      const desc  = it.querySelector("description")?.textContent?.trim() || "";
      const short = desc.replace(/<[^>]+>/g,"").slice(0, 180);

      return `
        <div class="item">
          <div style="font-weight:650; font-size:12.5px; line-height:1.25">${safeText(title)}</div>
          <small>${safeText(pub)}</small><br>
          <div class="hint" style="margin-top:6px">${safeText(short)}${short.length>=180?"…":""}</div>
          <div style="margin-top:8px">
            <a href="${safeText(link)}" target="_blank" rel="noopener">Abrir</a>
          </div>
        </div>
      `;
    }).join("");
  }catch(err){
    box.innerHTML = `
      <div class="item">
        <div style="font-weight:650">Error cargando RSS</div>
        <div class="hint">${safeText(String(err))}</div>
      </div>
    `;
  }
}

function saveSnapshot(snapNodeId){
  const snapNode = Engine.nodes.get(snapNodeId);
  if(!snapNode) return;

  const noteEl = document.getElementById("snapNote_" + snapNodeId);
  const note = (noteEl?.value || "").trim();

  let sym = "—";
  let tf  = "—";

  const coreId = getCoreIdOrNull();
  if(coreId){
    const c = Engine.nodes.get(coreId);
    sym = (c.state.symbol||"—").trim();
    tf  = (c.state.interval||"—").toString().trim();
  }else{
    for(const [id,n] of Engine.nodes){
      if(n.type==="chart"){ sym=(n.state.symbol||"—").trim(); tf=(n.state.interval||"—").toString().trim(); break; }
    }
  }

  const entry = { at: nowISO(), symbol:sym, interval:tf, note };
  snapNode.state.list = Array.isArray(snapNode.state.list) ? snapNode.state.list : [];
  snapNode.state.list.unshift(entry);

function renderSnapshots(snapNodeId){
  const m = Engine.nodes.get(snapNodeId);
  const box = document.getElementById("snaps_" + snapNodeId);
  if(!m || !box) return;

  const list = Array.isArray(m.state.list) ? m.state.list : [];
  if(!list.length){
    box.innerHTML = `<div class="item"><small>No snapshots aún.</small></div>`;
    return;
  }

  box.innerHTML = list.slice(0, 50).map((s, idx)=>`
    <div class="item">

      <small>${safeText(s.at)}</small>

        <button class="btn bad" style="padding:7px 9px;border-radius:12px" data-act="snapDel" data-idx="${idx}">🗑️</button>
      </div>
    </div>
  `).join("");

  box.onclick = (e)=>{
    const openBtn = e.target.closest('[data-act="snapOpen"]');
    const delBtn  = e.target.closest('[data-act="snapDel"]');

    if(openBtn){
      const i = Number(openBtn.dataset.idx);
      const s = list[i];
      if(!s) return;
      createNode({type:"chart", parentId:snapNodeId, state:{title:"Snapshot", symbol:s.symbol, interval:String(s.interval)}});

function testNotify(title, body){
  if(!("Notification" in window)){ alert("Este navegador no soporta Notification API."); return; }
  if(Notification.permission === "granted"){ new Notification(title, {body}); return; }
  if(Notification.permission !== "denied"){
    Notification.requestPermission().then(p=>{
      if(p==="granted") new Notification(title, {body});
      else alert("Permiso denegado.");
    });
    return;
  }

}

function addAlertRule(nodeId){
  const m = Engine.nodes.get(nodeId);
  if(!m) return;
  const op = prompt("Operador: >, <, >=, <=, =="," > ");
  if(op===null) return;
  const valueStr = prompt("Valor (número):","65000");
  if(valueStr===null) return;
  const value = Number(valueStr);
  if(!Number.isFinite(value)) return alert("Valor inválido.");
  const note = prompt("Nota (opcional):","breakout") || "";

  m.state.rules = Array.isArray(m.state.rules) ? m.state.rules : [];
  m.state.rules.push({op: op.trim(), value, note});

async function fetchCryptoUSD(coinId){
  const url = `https://api.coingecko.com/api/v3/simple/price?ids=${encodeURIComponent(coinId)}&vs_currencies=usd`;
  const data = await fetch(url, {cache:"no-store"}).then(r=>r.json());
  const v = data?.[coinId]?.usd;
  if(typeof v !== "number") throw new Error("CoinGecko: no price for " + coinId);
  return v;
}

function compare(op, a, b){
  if(op === ">")  return a > b;
  if(op === "<")  return a < b;
  if(op === ">=") return a >= b;
  if(op === "<=") return a <= b;
  if(op === "==") return a === b;
  return false;
}

async function evalAlertsOnce(nodeId){
  const m = Engine.nodes.get(nodeId);
  if(!m || !m.state.enabled) return;

  const rules = Array.isArray(m.state.rules) ? m.state.rules : [];
  if(!rules.length) return;

  let price = null;
  if(m.state.mode === "crypto"){
    const coinId = (m.state.symbol || "bitcoin").trim().toLowerCase();
    price = await fetchCryptoUSD(coinId);
  }else{
    price = Number(m.state.manualPrice);
    if(!Number.isFinite(price)) return;
  }

  for(const r of rules){
    if(compare(r.op, price, Number(r.value))){
      testNotify("Tech Blue Alert", `${m.state.mode==="crypto" ? (m.state.symbol||"crypto") : "manual"} price ${price} ${r.op} ${r.value} • ${r.note||""}`);
    }
  }
}

function startAlerts(nodeId){
  stopAlerts(nodeId);
  const m = Engine.nodes.get(nodeId);
  if(!m) return;

  if(!m.state.enabled){
    const ok = confirm("Enabled está Off. ¿Quieres encenderlo?");
    if(!ok) return;
    m.state.enabled = true;
    const el = getNodeEl(nodeId);
    const enabledSel = el?.querySelector('select[data-k="enabled"]');
    if(enabledSel) enabledSel.value = "true";
  }

  const every = Math.max(5, Number(m.state.everySec || 15));
  const timer = setInterval(()=>{ evalAlertsOnce(nodeId).catch(()=>{}); }, every * 1000);
  Engine.alertTimers.set(nodeId, timer);
  renderAlerts(nodeId);
}

function stopAlerts(nodeId){
  const t = Engine.alertTimers.get(nodeId);
  if(t){ clearInterval(t); Engine.alertTimers.delete(nodeId); }
  const m = Engine.nodes.get(nodeId);
  if(m && m.type==="alerts") renderAlerts(nodeId);
}

/* =========================================================
   Save / Load / Export / Import
========================================================= */
function snapshot(){
  return {
    version: 13,
    savedAt: nowISO(),
    nodes: Array.from(Engine.nodes.values()).map(n=>({
      id:n.id, type:n.type, parentId:n.parentId,
      x:n.x,y:n.y,w:n.w,h:n.h,
      state:n.state,
      angleIndex:n.angleIndex||0
    })),
    edges: Engine.edges.slice()
  };
}

function applySnapshot(data){
  for(const [id] of Engine.alertTimers) stopAlerts(id);

  Engine.nodes.clear();
  Engine.edges = [];
  $("#nodes").innerHTML = "";
  $("#wires").innerHTML = "";

  const byId = new Map();

  for(const n of (data.nodes||[])){
    const id = n.id;
    const model = {
      id,
      type:n.type,
      parentId:n.parentId ?? null,
      x:n.x ?? 100, y:n.y ?? 100,
      w:n.w ?? 320, h:n.h ?? 300,
      state: {...defaultNodeState(n.type), ...(n.state||{})},
      createdAt: Date.now(),
      angleIndex: n.angleIndex || 0,
    };
    Engine.nodes.set(id, model);
    byId.set(id, true);

    const el = document.createElement("div");
    el.className = "node";
    el.dataset.id = id;
    el.dataset.type = model.type;
    el.style.width = model.w + "px";
    el.style.zIndex = (++Engine.z).toString();

    el.innerHTML = `
      <div class="nodeHead" data-drag>
        <div class="nodeTitle">
          <span class="chip">${model.type.toUpperCase()}</span>
          <b data-title>${safeText(model.state.title || model.type)}</b>
        </div>
        <div class="nodeTools">
          <button class="mini" title="Crear nodo hijo" data-act="spawn">＋</button>
          ${model.type==="core" ? "" : `<button class="mini" title="Traer al frente" data-act="front">⬆</button>`}
          ${model.type==="core" ? "" : `<button class="mini" title="Eliminar" data-act="del">✕</button>`}
        </div>
      </div>
      <div class="nodeBody">${renderBody(model.type, id, model.state)}</div>
    `;

    $("#nodes").appendChild(el);
    syncNodeDOM(id);
    bindNode(id);

    if(model.type==="watchlist") renderWatchlistTags(id);
    if(model.type==="snapshots") renderSnapshots(id);
    if(model.type==="alerts") renderAlerts(id);
  }

  Engine.edges = (data.edges||[]).filter(e=> byId.has(e.from) && byId.has(e.to));

  for(const [id, m] of Engine.nodes){
    if(m.type==="chart" || m.type==="core") renderTradingViewWidgetSimple(id);
    if(m.type==="multichart"){ renderMultiChart(id); applyMultiLayout(id); bindMultiResize(id); }
    if(m.type==="news" || m.type==="calendar") loadFeed(id);
  }

  drawWires();
  saveAuto();
}

function saveAuto(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(snapshot())); }catch(_){}
}
function loadAuto(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return false;
    applySnapshot(JSON.parse(raw));
    return true;
  }catch(_){ return false; }
}

    colB = [...mult, ...charts];
    colC = [...news, ...cal, ...snaps, ...strat, ...notes];
  }else{
    colA = [...core, ...snaps, ...notes];
    colB = [...mult, ...charts];
    colC = [...news, ...cal, ...watch, ...strat, ...alerts];
  }

  const colW = Math.max(360, Math.floor((sr.width - padX*4)/3));
  const x1 = padX;
  const x2 = padX*2 + colW;
  const x3 = padX*3 + colW*2;

  function stack(col, x){
    let y = padY;
    for(const n of col){
      n.x = clamp(x, 10, sr.width - n.w - 10);
      n.y = clamp(y, 64, sr.height - n.h - 10);
      syncNodeDOM(n.id);
      y += n.h + 12;
    }
  }

  stack(colA, x1);
  stack(colB, x2);
  stack(colC, x3);

  drawWires();
  for(const [id,m] of Engine.nodes){
    if(m.type==="multichart") applyMultiLayout(id);
  }
  saveAuto();
}

$("#btnExport").onclick = ()=>{
  const data = snapshot();
  const blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "techblue-node-engine-v1_3.json";
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1500);
};

$("#btnImport").onclick = async ()=>{
  const inp = document.createElement("input");
  inp.type = "file";
  inp.accept = "application/json";
  inp.onchange = async ()=>{
    const f = inp.files?.[0];
    if(!f) return;
    const txt = await f.text();
    try{ applySnapshot(JSON.parse(txt)); alert("✅ Importado"); }
    catch(err){ alert("❌ JSON inválido: " + err); }
  };
  inp.click();
};

$("#btnResetAll").onclick = ()=>{
  if(!confirm("Esto borra TODO en este navegador. ¿Seguro?")) return;
  localStorage.removeItem(STORE_KEY);
  location.reload();
};

function coreStateHint(){
  const coreId = getCoreIdOrNull();
  if(!coreId) return {};
  const core = Engine.nodes.get(coreId);
  return { symbol: core.state.symbol, interval: core.state.interval };
}
